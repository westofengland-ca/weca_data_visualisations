<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy locations map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    // >>> GENERATED_LOCATIONS
    const LOCATIONS = [
      {"uid": 1, "name": "alpha", "lon": -2.5879, "lat": 51.4545, "category": "retail"},
      {"uid": 2, "name": "beta", "lon": -2.359, "lat": 51.3811, "category": "office"},
      {"uid": 3, "name": "charlie", "lon": -2.9779, "lat": 51.347, "category": "leisure"},
      {"uid": 4, "name": "delta", "lon": -2.4184, "lat": 51.5416, "category": "transport"},
      {"uid": 5, "name": "echo", "lon": -2.4958, "lat": 51.413, "category": "residential"}
    ];
    // <<< GENERATED_LOCATIONS

    const map = L.map("map").setView([51.42, -2.55], 9);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(map);

    const bounds = [];

    LOCATIONS.forEach((location) => {
      const marker = L.marker([location.lat, location.lon]).addTo(map);

      marker.bindPopup(
        `<strong>${location.name}</strong><br>` +
        `Category: ${location.category}<br>` +
        `UID: ${location.uid}`
      );

      bounds.push([location.lat, location.lon]);
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  </script>
</body>
</html>
