<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy locations map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    // >>> GENERATED_LOCATIONS
    const LOCATIONS = [
      {"uid": 1, "name": "alpha", "lon": -2.5879, "lat": 51.4545, "category": "retail", "link_url": "http://localhost:8000/alpha"},
      {"uid": 2, "name": "beta", "lon": -2.359, "lat": 51.3811, "category": "office", "link_url": "http://localhost:8000/beta"},
      {"uid": 3, "name": "charlie", "lon": -2.9779, "lat": 51.347, "category": "leisure", "link_url": "http://localhost:8000/charlie"},
      {"uid": 4, "name": "delta", "lon": -2.4184, "lat": 51.5416, "category": "transport", "link_url": "http://localhost:8000/delta"},
      {"uid": 5, "name": "echo", "lon": -2.4958, "lat": 51.413, "category": "residential", "link_url": "http://localhost:8000/echo"}
    ];
    // <<< GENERATED_LOCATIONS

    const CATEGORY_COLORS = {
      retail: "#e41a1c",
      office: "#377eb8",
      leisure: "#4daf4a",
      transport: "#984ea3",
      residential: "#ff7f00",
    };

    const DEFAULT_COLOR = "#666666";

    function categoryColor(category) {
      return CATEGORY_COLORS[category] || DEFAULT_COLOR;
    }

    const map = L.map("map").setView([51.42, -2.55], 9);

    const basemap = L.tileLayer(
      "http://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
      {
        maxZoom: 19,
        attribution:
          "Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ, TomTom, Intermap, iPC, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community",
      }
    ).addTo(map);

    const categoryLayers = {};
    const bounds = [];

    LOCATIONS.forEach((location) => {
      if (!categoryLayers[location.category]) {
        categoryLayers[location.category] = L.layerGroup();
      }

      const point = L.circleMarker([location.lat, location.lon], {
        radius: 8,
        fillColor: categoryColor(location.category),
        color: "#333333",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.85,
      });

      point.bindPopup(
        `<strong>${location.name}</strong><br>` +
        `Category: ${location.category}<br>` +
        `UID: ${location.uid}<br>` +
        `<a href="${location.link_url}" target="_blank" rel="noopener noreferrer">Link</a>`
      );

      categoryLayers[location.category].addLayer(point);
      bounds.push([location.lat, location.lon]);
    });

    Object.values(categoryLayers).forEach((layer) => layer.addTo(map));

    L.control.layers({ "World Topo": basemap }, categoryLayers).addTo(map);

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  </script>
</body>
</html>
